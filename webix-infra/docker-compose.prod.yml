version: '3.8'

services:
  backend:
    build:
      context: ../webix-backend
      dockerfile: Dockerfile
    image: webix-backend:prod
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - ../webix-backend/.env
    environment:
      - NODE_ENV=production
    networks:
      - webix-network

  frontend:
    build:
      context: ../webix-frontend
      dockerfile: Dockerfile
      args:
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
        - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
        - VITE_API_URL=/api
    image: webix-frontend:prod
    restart: always
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - webix-network

networks:
  webix-network:
    driver: bridge
